title: PsExec Lateral Movement Detection
id: 42afa7b3-0c2e-4c5b-b23e-aa6f58a7c8e1
status: stable
description: Detects lateral movement via PsExec by monitoring for PSEXESVC service creation
references:
    - https://attack.mitre.org/techniques/T1021/002/
    - https://docs.microsoft.com/en-us/sysinternals/downloads/psexec
author: DFIR Lab
date: 2024-01-01
tags:
    - attack.lateral_movement
    - attack.t1021.002
logsource:
    category: system
    product: windows
detection:
    selection:
        EventID: 7045
        ServiceName:
            - PSEXESVC
            - psexesvc
    condition: selection
falsepositives:
    - Legitimate PsExec usage by administrators
    - Automated deployment tools
level: high

---
title: Remote Registry Access for Lateral Movement
id: bc5cb6c7-0e1b-4d78-ace2-0e5c1a7a4b21
status: stable
description: Detects suspicious remote registry access patterns used for lateral movement
author: DFIR Lab
date: 2024-01-01
tags:
    - attack.lateral_movement
    - attack.t1021.002
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\reg.exe'
        CommandLine|contains:
            - '\\\\'
    condition: selection
falsepositives:
    - Legitimate remote registry management
level: medium

---
title: WMI Remote Execution
id: d7c50c2a-1f34-4e88-b9a7-3c8d4f1e9b02
status: stable
description: Detects WMI-based lateral movement via wmiprvse.exe spawning unusual child processes
author: DFIR Lab
date: 2024-01-01
tags:
    - attack.lateral_movement
    - attack.t1047
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        ParentImage|endswith:
            - '\WmiPrvSE.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\cscript.exe'
            - '\wscript.exe'
            - '\mshta.exe'
    condition: selection
falsepositives:
    - WMI-based management software
    - Monitoring agents using WMI
level: high
